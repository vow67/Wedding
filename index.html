<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memories · Photo Collection</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />

    <style>
        /* ========== RESET & VARIABLES ========== */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0b0d0f;
            --bg-secondary: #14181c;
            --bg-card: #1c2127;
            --bg-elevated: #262d35;
            --text-primary: #f0f2f5;
            --text-secondary: #a8b3c0;
            --text-muted: #6b7a8a;
            --accent: #7b8cff;
            --border-subtle: rgba(255, 255, 255, 0.06);
            --shadow-card: 0 8px 30px rgba(0, 0, 0, 0.5);
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --transition: 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            padding: 1.5rem;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
        }

        /* ========== HEADER ========== */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-subtle);
        }

        .app-header .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .app-header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #f0f2f5 0%, #a8b3c0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .app-header .stats {
            font-size: 0.85rem;
            color: var(--text-secondary);
            background: var(--bg-secondary);
            padding: 0.4rem 1rem;
            border-radius: 40px;
            border: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .app-header .stats span {
            font-weight: 500;
            color: var(--text-primary);
        }

        /* ========== SECTION HEAD ========== */
        .section-head {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin: 0 0 1rem;
        }

        .section-head h2 {
            font-size: 1.35rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .section-head h2 .badge {
            font-size: 0.7rem;
            font-weight: 500;
            background: var(--bg-elevated);
            color: var(--text-secondary);
            padding: 0.15rem 0.7rem;
            border-radius: 30px;
        }

        .section-head .hint {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* ========== TOOLBAR (filter + search) ========== */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.8rem 1.2rem;
            margin-bottom: 1.5rem;
        }

        .filter-bar {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: transparent;
            border: 1px solid var(--border-subtle);
            color: var(--text-secondary);
            padding: 0.45rem 1.3rem;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s;
            font-family: inherit;
            background: var(--bg-secondary);
        }

        .filter-btn:hover {
            background: var(--bg-elevated);
            color: var(--text-primary);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .filter-btn.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            box-shadow: 0 4px 16px rgba(123, 140, 255, 0.25);
        }

        .search-box {
            position: relative;
            flex: 1 1 180px;
            min-width: 140px;
        }

        .search-box input {
            width: 100%;
            padding: 0.45rem 1rem 0.45rem 2.2rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: 40px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.85rem;
            transition: border 0.3s;
            outline: none;
        }

        .search-box input::placeholder {
            color: var(--text-muted);
        }

        .search-box input:focus {
            border-color: var(--accent);
        }

        .search-box .icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.9rem;
            pointer-events: none;
        }

        .gallery-actions {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .gallery-actions button {
            background: transparent;
            border: 1px solid var(--border-subtle);
            color: var(--text-secondary);
            padding: 0.45rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s;
            font-family: inherit;
            background: var(--bg-secondary);
            white-space: nowrap;
        }

        .gallery-actions button:hover {
            background: var(--bg-elevated);
            color: var(--text-primary);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .gallery-actions button.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        /* ========== GALLERY GRID ========== */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.25rem;
        }

        .gallery-item {
            position: relative;
            border-radius: var(--radius-md);
            overflow: hidden;
            aspect-ratio: 1 / 1;
            cursor: pointer;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                box-shadow 0.4s ease;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
        }

        .gallery-item:hover {
            transform: translateY(-6px) scale(1.01);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.5);
            border-color: rgba(255, 255, 255, 0.08);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease, opacity 0.4s ease;
            opacity: 0;
        }

        .gallery-item img.loaded {
            opacity: 1;
        }

        .gallery-item:hover img {
            transform: scale(1.05);
        }

        .gallery-item .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0.7) 0%, transparent 55%);
            opacity: 0;
            transition: opacity 0.35s ease;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 1.2rem;
        }

        .gallery-item:hover .overlay {
            opacity: 1;
        }

        .gallery-item .overlay .photo-id {
            font-size: 0.75rem;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 0.3px;
        }

        .gallery-item .overlay .photo-category {
            font-size: 0.8rem;
            font-weight: 500;
            color: #fff;
            margin-top: 0.15rem;
        }

        .gallery-item .category-tag {
            position: absolute;
            top: 12px;
            right: 12px;
            font-size: 0.6rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(6px);
            color: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.06);
            z-index: 2;
        }

        .gallery-item[data-category="Childhood"] .category-tag {
            border-left: 2px solid #6bcbff;
        }
        .gallery-item[data-category="Family"] .category-tag {
            border-left: 2px solid #7b8cff;
        }
        .gallery-item[data-category="Wedding"] .category-tag {
            border-left: 2px solid #ff8a9e;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem 1rem;
            color: var(--text-muted);
            font-size: 0.95rem;
            border: 2px dashed var(--border-subtle);
            border-radius: var(--radius-lg);
        }

        /* ========== LIGHTBOX ========== */
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.88);
            backdrop-filter: blur(14px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 2rem;
            animation: lightboxFade 0.3s ease;
            flex-direction: column;
        }

        .lightbox.open {
            display: flex;
        }

        @keyframes lightboxFade {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .lightbox-main {
            position: relative;
            width: 100%;
            max-width: 90vw;
            max-height: 72vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
        }

        .lightbox-content {
            max-width: 100%;
            max-height: 72vh;
            border-radius: var(--radius-md);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.7);
            object-fit: contain;
            animation: lightboxScale 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            border: 1px solid rgba(255, 255, 255, 0.04);
            background: var(--bg-primary);
        }

        @keyframes lightboxScale {
            from {
                transform: scale(0.92);
                opacity: 0.6;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .lightbox-close {
            position: fixed;
            top: 20px;
            right: 28px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #fff;
            font-size: 1.6rem;
            cursor: pointer;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s;
            backdrop-filter: blur(8px);
            z-index: 1001;
            font-weight: 300;
        }

        .lightbox-close:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: rotate(90deg);
        }

        .lightbox-fullscreen {
            position: fixed;
            top: 20px;
            right: 84px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #fff;
            font-size: 1.2rem;
            cursor: pointer;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s;
            backdrop-filter: blur(8px);
            z-index: 1001;
        }

        .lightbox-fullscreen:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .lightbox-nav {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #fff;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 1.4rem;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1001;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .lightbox-nav:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-50%) scale(1.05);
        }

        .lightbox-nav.prev {
            left: 28px;
        }
        .lightbox-nav.next {
            right: 28px;
        }

        .lightbox-counter {
            position: fixed;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            padding: 0.35rem 1.2rem;
            border-radius: 40px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.06);
            z-index: 1001;
            letter-spacing: 0.3px;
        }

        .lightbox-counter span {
            color: #fff;
            font-weight: 500;
        }

        /* Thumbnail strip */
        .lightbox-thumbs {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            border-radius: var(--radius-md);
            border: 1px solid rgba(255, 255, 255, 0.06);
            max-width: 85vw;
            overflow-x: auto;
            z-index: 1001;
            scrollbar-width: thin;
            scrollbar-color: var(--text-muted) transparent;
        }

        .lightbox-thumbs::-webkit-scrollbar {
            height: 4px;
        }

        .lightbox-thumbs::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: 10px;
        }

        .lightbox-thumb {
            flex: 0 0 60px;
            width: 60px;
            height: 60px;
            border-radius: var(--radius-sm);
            overflow: hidden;
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.3s, transform 0.2s;
            border: 2px solid transparent;
            flex-shrink: 0;
        }

        .lightbox-thumb:hover {
            opacity: 0.8;
        }

        .lightbox-thumb.active {
            opacity: 1;
            border-color: var(--accent);
            transform: scale(1.05);
        }

        .lightbox-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 820px) {
            body {
                padding: 0.75rem;
            }
            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 0.9rem;
            }
            .app-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .lightbox-content {
                max-height: 60vh;
            }
            .lightbox-close {
                top: 12px;
                right: 16px;
                width: 40px;
                height: 40px;
                font-size: 1.2rem;
            }
            .lightbox-fullscreen {
                top: 12px;
                right: 64px;
                width: 40px;
                height: 40px;
                font-size: 1rem;
            }
            .lightbox-nav {
                width: 40px;
                height: 40px;
                font-size: 1.1rem;
            }
            .lightbox-nav.prev {
                left: 12px;
            }
            .lightbox-nav.next {
                right: 12px;
            }
            .lightbox-counter {
                bottom: 85px;
                font-size: 0.7rem;
                padding: 0.25rem 1rem;
            }
            .lightbox-thumbs {
                bottom: 12px;
                padding: 6px 10px;
                gap: 6px;
            }
            .lightbox-thumb {
                flex: 0 0 50px;
                width: 50px;
                height: 50px;
            }
            .toolbar {
                flex-direction: column;
                align-items: stretch;
            }
            .search-box {
                flex: 1 1 auto;
            }
        }

        @media (max-width: 480px) {
            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.7rem;
            }
            .app-header h1 {
                font-size: 1.4rem;
            }
            .filter-btn {
                font-size: 0.75rem;
                padding: 0.3rem 0.9rem;
            }
            .lightbox-thumb {
                flex: 0 0 40px;
                width: 40px;
                height: 40px;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- HEADER -->
        <header class="app-header">
            <div class="brand">
                <span style="font-size:1.8rem;">🖼️</span>
                <h1>Memories</h1>
            </div>
            <div class="stats">
                📷 <span id="totalCount">150</span> photos
                <span style="opacity:0.3;margin:0 0.3rem;">·</span>
                <span id="categoryStats">Childhood · Family · Wedding</span>
            </div>
        </header>

        <!-- GALLERY TOOLBAR -->
        <div class="section-head">
            <h2>🖼️ Collection <span class="badge" id="galleryBadge">all</span></h2>
            <span class="hint" id="galleryCount">150 photos</span>
        </div>

        <div class="toolbar">
            <div class="filter-bar" id="filterBar">
                <button class="filter-btn active" data-category="all">All</button>
                <button class="filter-btn" data-category="Childhood">👶 Childhood</button>
                <button class="filter-btn" data-category="Family">👨‍👩‍👧‍👦 Family</button>
                <button class="filter-btn" data-category="Wedding">💍 Wedding</button>
            </div>
            <div class="search-box">
                <span class="icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Search by ID (e.g. 42)" />
            </div>
            <div class="gallery-actions">
                <button id="gallerySlideshowBtn">▶ Play Slideshow</button>
            </div>
        </div>

        <!-- GALLERY GRID -->
        <div class="gallery-grid" id="galleryGrid"></div>

    </div>

    <!-- LIGHTBOX -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightboxClose">✕</button>
        <button class="lightbox-fullscreen" id="lightboxFullscreen">⛶</button>
        <button class="lightbox-nav prev" id="lightboxPrev">‹</button>
        <button class="lightbox-nav next" id="lightboxNext">›</button>
        <div class="lightbox-main">
            <img class="lightbox-content" id="lightboxImg" src="" alt="Enlarged view" />
        </div>
        <div class="lightbox-counter"><span id="lbCurrent">1</span> / <span id="lbTotal">1</span></div>
        <div class="lightbox-thumbs" id="lightboxThumbs"></div>
    </div>

    <script>
        (function() {
            'use strict';

            // =============================================================
            // 1. DATA – using images from external GitHub repo
            // =============================================================
            const allImages = [];
            const baseUrl = 'https://raw.githubusercontent.com/kalkidangetaneh28-cell/Adi/main/images/';

            for (let i = 1; i <= 150; i++) {
                const ext = (i >= 59) ? '.JPG' : '.jpg';
                let category = '';
                if (i <= 50) category = 'Childhood';
                else if (i <= 100) category = 'Family';
                else category = 'Wedding';
                allImages.push({
                    id: i,
                    src: baseUrl + i + ext,
                    alt: `Photo ${i}`,
                    category: category
                });
            }
            document.getElementById('totalCount').textContent = allImages.length;

            // =============================================================
            // 2. GALLERY with filter, search, slideshow
            // =============================================================
            const galleryGrid = document.getElementById('galleryGrid');
            const filterBar = document.getElementById('filterBar');
            const galleryBadge = document.getElementById('galleryBadge');
            const galleryCount = document.getElementById('galleryCount');
            const searchInput = document.getElementById('searchInput');
            const slideshowBtn = document.getElementById('gallerySlideshowBtn');

            let currentCategory = 'all';
            let searchQuery = '';
            let gallerySlideshowInterval = null;
            let isGallerySlideshow = false;
            let currentFiltered = [];

            // Lightbox
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightboxImg');
            const lightboxClose = document.getElementById('lightboxClose');
            const lightboxFullscreen = document.getElementById('lightboxFullscreen');
            const lightboxPrev = document.getElementById('lightboxPrev');
            const lightboxNext = document.getElementById('lightboxNext');
            const lbCurrent = document.getElementById('lbCurrent');
            const lbTotal = document.getElementById('lbTotal');
            const thumbsContainer = document.getElementById('lightboxThumbs');

            let lbImages = [];
            let lbIndex = 0;

            function getFiltered() {
                let result = allImages;
                if (currentCategory !== 'all') {
                    result = result.filter(img => img.category === currentCategory);
                }
                if (searchQuery.trim() !== '') {
                    const q = searchQuery.trim().toLowerCase();
                    result = result.filter(img => img.id.toString().includes(q) || img.alt.toLowerCase().includes(q));
                }
                return result;
            }

            function renderGallery() {
                const filtered = getFiltered();
                currentFiltered = filtered;
                galleryBadge.textContent = currentCategory === 'all' ? 'all' : currentCategory;
                galleryCount.textContent = `${filtered.length} photos`;

                if (filtered.length === 0) {
                    galleryGrid.innerHTML = `<div class="empty-state">✨ No photos match your criteria</div>`;
                    return;
                }

                galleryGrid.innerHTML = '';
                filtered.forEach((item) => {
                    const div = document.createElement('div');
                    div.className = 'gallery-item';
                    div.dataset.category = item.category;

                    const img = document.createElement('img');
                    img.src = item.src;
                    img.alt = item.alt;
                    img.loading = 'lazy';
                    img.addEventListener('load', () => img.classList.add('loaded'));
                    if (img.complete) img.classList.add('loaded');

                    const tag = document.createElement('div');
                    tag.className = 'category-tag';
                    tag.textContent = item.category;

                    const overlay = document.createElement('div');
                    overlay.className = 'overlay';
                    overlay.innerHTML = `
                        <div class="photo-id">#${item.id}</div>
                        <div class="photo-category">${item.category}</div>
                    `;

                    div.appendChild(img);
                    div.appendChild(tag);
                    div.appendChild(overlay);

                    div.addEventListener('click', () => {
                        openLightbox(filtered, filtered.indexOf(item));
                    });

                    div.addEventListener('dblclick', (e) => {
                        e.stopPropagation();
                        openLightbox(filtered, filtered.indexOf(item));
                        setTimeout(() => toggleFullscreen(), 100);
                    });

                    galleryGrid.appendChild(div);
                });
            }

            // Filter buttons
            filterBar.addEventListener('click', (e) => {
                const btn = e.target.closest('.filter-btn');
                if (!btn) return;
                const cat = btn.dataset.category;
                if (cat === currentCategory) return;
                filterBar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = cat;
                if (isGallerySlideshow) stopGallerySlideshow();
                renderGallery();
            });

            // Search
            let searchTimer = null;
            searchInput.addEventListener('input', () => {
                clearTimeout(searchTimer);
                searchTimer = setTimeout(() => {
                    searchQuery = searchInput.value;
                    if (isGallerySlideshow) stopGallerySlideshow();
                    renderGallery();
                }, 250);
            });

            // Gallery slideshow (auto-cycles inside lightbox)
            function startGallerySlideshow() {
                if (gallerySlideshowInterval) clearInterval(gallerySlideshowInterval);
                const filtered = getFiltered();
                if (filtered.length === 0) return;
                let idx = 0;
                openLightbox(filtered, 0);
                gallerySlideshowInterval = setInterval(() => {
                    idx = (idx + 1) % filtered.length;
                    openLightbox(filtered, idx, true);
                }, 3000);
                isGallerySlideshow = true;
                slideshowBtn.textContent = '⏸ Pause Slideshow';
                slideshowBtn.classList.add('active');
            }

            function stopGallerySlideshow() {
                if (gallerySlideshowInterval) {
                    clearInterval(gallerySlideshowInterval);
                    gallerySlideshowInterval = null;
                }
                isGallerySlideshow = false;
                slideshowBtn.textContent = '▶ Play Slideshow';
                slideshowBtn.classList.remove('active');
                if (lightbox.classList.contains('open')) closeLightbox();
            }

            function toggleGallerySlideshow() {
                if (isGallerySlideshow) {
                    stopGallerySlideshow();
                } else {
                    startGallerySlideshow();
                }
            }

            slideshowBtn.addEventListener('click', toggleGallerySlideshow);

            // Space key to toggle slideshow (only when lightbox is closed)
            document.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'INPUT') return;
                if (e.key === ' ' && !lightbox.classList.contains('open')) {
                    e.preventDefault();
                    toggleGallerySlideshow();
                }
            });

            // =============================================================
            // 3. LIGHTBOX
            // =============================================================
            function openLightbox(images, index, fromSlideshow = false) {
                lbImages = images;
                lbIndex = index;
                updateLightbox();
                if (!fromSlideshow && isGallerySlideshow) stopGallerySlideshow();
                lightbox.classList.add('open');
                document.body.style.overflow = 'hidden';
                buildThumbnails();
            }

            function updateLightbox() {
                const img = lbImages[lbIndex];
                lightboxImg.src = img.src;
                lightboxImg.alt = img.alt;
                lbCurrent.textContent = lbIndex + 1;
                lbTotal.textContent = lbImages.length;
                const thumbs = thumbsContainer.querySelectorAll('.lightbox-thumb');
                thumbs.forEach((th, i) => th.classList.toggle('active', i === lbIndex));
                const activeThumb = thumbs[lbIndex];
                if (activeThumb) {
                    activeThumb.scrollIntoView({ block: 'nearest', inline: 'center', behavior: 'smooth' });
                }
            }

            function buildThumbnails() {
                thumbsContainer.innerHTML = '';
                lbImages.forEach((img, idx) => {
                    const thumb = document.createElement('div');
                    thumb.className = 'lightbox-thumb' + (idx === lbIndex ? ' active' : '');
                    const thumbImg = document.createElement('img');
                    thumbImg.src = img.src;
                    thumbImg.alt = img.alt;
                    thumbImg.loading = 'lazy';
                    thumb.appendChild(thumbImg);
                    thumb.addEventListener('click', (e) => {
                        e.stopPropagation();
                        lbIndex = idx;
                        updateLightbox();
                    });
                    thumbsContainer.appendChild(thumb);
                });
            }

            function closeLightbox() {
                lightbox.classList.remove('open');
                document.body.style.overflow = '';
                if (isGallerySlideshow) stopGallerySlideshow();
            }

            function navigateLightbox(delta) {
                const newIdx = lbIndex + delta;
                if (newIdx < 0 || newIdx >= lbImages.length) return;
                lbIndex = newIdx;
                updateLightbox();
            }

            function toggleFullscreen() {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(() => {});
                } else {
                    document.exitFullscreen().catch(() => {});
                }
            }

            lightboxClose.addEventListener('click', closeLightbox);
            lightboxFullscreen.addEventListener('click', toggleFullscreen);
            lightboxPrev.addEventListener('click', (e) => { e.stopPropagation();
                navigateLightbox(-1); });
            lightboxNext.addEventListener('click', (e) => { e.stopPropagation();
                navigateLightbox(1); });

            lightbox.addEventListener('click', (e) => {
                if (e.target === lightbox) closeLightbox();
            });

            document.addEventListener('keydown', (e) => {
                if (!lightbox.classList.contains('open')) return;
                if (e.key === 'Escape') closeLightbox();
                if (e.key === 'ArrowLeft') navigateLightbox(-1);
                if (e.key === 'ArrowRight') navigateLightbox(1);
                if (e.key === 'f' || e.key === 'F') toggleFullscreen();
            });

            lightboxImg.addEventListener('dblclick', toggleFullscreen);

            // =============================================================
            // 4. INIT
            // =============================================================
            renderGallery();

        })();
    </script>

</body>
</html>
